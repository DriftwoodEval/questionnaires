[tools]
python = "3.14.6"
uv = "latest"

[settings.task]
output = "interleave"

[tasks.install]
description = "Install dependencies and register git hooks"
run = """
uv sync
uv run lefthook install
"""

[tasks.check]
description = "Lint and format Python, check for unused dependencies, and type-check"
run = """
uv run ruff check . --fix
uv run ruff format .
uv run deptry .
uv run pyright --stats
"""

[tasks.test]
description = "Run the test suite"
raw_args = true
run = "uv run pytest"

[tasks."test-docker"]
description = "Build the Docker image's test stage from scratch (no cache, matching CI) and run pytest inside it"
run = "docker build --pull --no-cache --target test -t questionnaires-test . && docker run --rm -e HEADLESS=true questionnaires-test"

[tasks."test-integration"]
description = "Run all integration tests against real third-party sites (never run in CI; prints a cleanup list of clients to delete at the end)"
raw_args = true
env = { COVERAGE_FILE = ".coverage.integration" }
run = "uv run pytest -s tests/integration -m integration"

[tasks."test-integration:mhs"]
description = "Run MHS integration tests only"
raw_args = true
env = { COVERAGE_FILE = ".coverage.integration" }
run = "uv run pytest -s tests/integration -m 'integration and mhs'"

[tasks."test-integration:qglobal"]
description = "Run QGlobal integration tests only"
raw_args = true
env = { COVERAGE_FILE = ".coverage.integration" }
run = "uv run pytest -s tests/integration -m 'integration and qglobal'"

[tasks."test-integration:wps"]
description = "Run WPS integration tests only"
raw_args = true
env = { COVERAGE_FILE = ".coverage.integration" }
run = "uv run pytest -s tests/integration -m 'integration and wps'"

[tasks.coverage]
description = "Combine coverage from unit + integration test runs (if present) and regenerate the HTML report, without re-running tests"
run = """
set -e
sources=".coverage.unit"
if [ -f .coverage.integration ]; then
  sources="$sources .coverage.integration"
fi
uv run coverage combine --keep --data-file=.coverage $sources
uv run coverage html
echo "Report written to htmlcov/index.html"
"""

[tasks.qsend]
description = "Send questionnaires to clients ahead of their appointments"
raw_args = true
run = "uv run qsend.py"

[tasks.qreceive]
raw_args = true
description = "Check on sent questionnaires, send reminders, and sync completion status"
run = "uv run qreceive.py"

[tasks.piecework]
description = "Run piecework/billing processing"
run = "uv run piecework.py"

[tasks."records-request"]
description = "Automatic records request form downloads and sending"
run = "uv run records-request.py"

[tasks."log-server"]
description = "Start the log server that collects logs from the other scripts"
run = "uv run log-server.py"
